name: Export Cadvisor Image (Compressed)
on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull cadvisor image
        run: |
          docker pull gcr.io/cadvisor:v0.49.1

      - name: Retag to standard name
        run: |
          docker tag gcr.io/cadvisor:v0.49.1 cadvisor/cadvisor:v0.49.1

      - name: Verify retagged image exists
        run: |
          if docker image inspect cadvisor/cadvisor:v0.49.1 > /dev/null 2>&1; then
            echo "✅ Retagged image cadvisor/cadvisor:v0.49.1 is ready."
          else
            echo "❌ Retag failed! Aborting."
            exit 1
          fi

      - name: Save and Compress to tar.gz
        run: |
          docker save cadvisor/cadvisor:v0.49.1 | gzip > /tmp/cadvisor-v0.49.1.tar.gz
          echo "Generated compressed file:"
          ls -lh /tmp/cadvisor-v0.49.1.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadvisor-only-compressed
          path: /tmp/cadvisor-v0.49.1.tar.gz
          retention-days: 3
