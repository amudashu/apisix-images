name: Export Cadvisor v0.49.1
on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull cadvisor from gcr
        run: |
          for i in {1..3}; do
            docker pull gcr.io/cadvisor:v0.49.1 && exit 0
            echo "第$i次拉取失败，重试中..."
            sleep 5
          done
          echo "拉取失败，请检查gcr.io状态"
          exit 1
        shell: bash

      - name: Retag to standard name
        run: docker tag gcr.io/cadvisor:v0.49.1 cadvisor/cadvisor:v0.49.1
        shell: bash

      - name: Save and compress
        run: |
          docker save cadvisor/cadvisor:v0.49.1 | gzip > /tmp/cadvisor-v0.49.1.tar.gz
          ls -lh /tmp/cadvisor-v0.49.1.tar.gz
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadvisor-v0.49.1
          path: /tmp/cadvisor-v0.49.1.tar.gz
          retention-days: 3
