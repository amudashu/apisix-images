name: Export APISIX Images
on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull apisix image
        run: |
          # 拉一个确定存在的 tag
          docker pull apache/apisix:3.11.0-debian
          
          # ★ 关键：retag 成你 chart 里写的 tag 名，否则 import 后名字对不上还会 ErrImagePull
          docker tag apache/apisix:3.11.0-debian apache/apisix:3.11.0-debian-12

      - name: Save to tar
        run: |
          docker save apache/apisix:3.11.0-debian-12 -o /tmp/apisix.tar
          ls -lh /tmp/apisix.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apisix-only
          path: /tmp/apisix.tar
          retention-days: 3
