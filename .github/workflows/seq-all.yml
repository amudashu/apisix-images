name: Sync Observability Images

on:
  workflow_dispatch:

jobs:
  pull-and-save:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: datalust/seq:2025.2
            name: seq-2025.2
          - image: prom/prometheus:v3.5.3
            name: prometheus-v3.5.3
          - image: grafana/grafana:12.4.4
            name: grafana-12.4.4
          - image: otel/opentelemetry-collector-contrib:0.124.0
            name: otel-collector-0.124.0

    steps:
      - name: Pull ${{ matrix.image }}
        run: docker pull ${{ matrix.image }}

      - name: Save image to tar
        run: |
          docker save ${{ matrix.image }} -o ${{ matrix.name }}.tar
          ls -lh ${{ matrix.name }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar
          retention-days: 3
